name: Integration Cloud

on:
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Bruin CLI
        run: |
          curl -fsSL https://getbruin.com/install/cli | bash
          echo "$HOME/.bruin/bin" >> "$GITHUB_PATH"

      - name: Create CI Bruin configuration
        run: |
          cat > .bruin.yml <<EOF
          default_environment: default

          environments:
            default:
              connections:
                google_cloud_platform:
                  - name: gcp
                    project_id: ${{ vars.GCP_PROJECT_ID }}
                    location: ${{ vars.GCP_REGION }}
                    service_account_file: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
          EOF

      - name: Apply Terraform infrastructure
        run: |
          export TF_VAR_project_id="${{ vars.GCP_PROJECT_ID }}"
          export TF_VAR_region="${{ vars.GCP_REGION }}"
          terraform -chdir=infrastructure/gcp init
          terraform -chdir=infrastructure/gcp apply -auto-approve

      - name: Export bucket name
        run: |
          echo "RAW_DATA_LAKE_BUCKET=$(terraform -chdir=infrastructure/gcp output -raw data_lake_bucket_name)" >> "$GITHUB_ENV"

      - name: Upload raw files to GCS
        run: make upload-raw

      - name: Run Bruin pipeline in BigQuery
        run: bruin run pipeline/pipeline.yml

      - name: Smoke test datasets
        run: |
          bq ls --project_id "${{ vars.GCP_PROJECT_ID }}"
          bq ls "${{ vars.GCP_PROJECT_ID }}:analytics"

      - name: Smoke test fact tables
        run: |
          bq query --use_legacy_sql=false 'SELECT COUNT(*) AS row_count FROM `${{ vars.GCP_PROJECT_ID }}.analytics.fct_author_appearances`'
          bq query --use_legacy_sql=false 'SELECT COUNT(*) AS row_count FROM `${{ vars.GCP_PROJECT_ID }}.analytics.fct_genre_by_year`'
